name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-test:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: hideseek
          POSTGRES_PASSWORD: hideseek
          POSTGRES_DB: hideseek
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hideseek"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build shared package
        run: npx -y turbo run build --filter=@hideseek/shared

      - name: Run database migrations
        run: npx -y turbo run db:migrate --filter=@hideseek/server
        env:
          DATABASE_URL: postgresql://hideseek:hideseek@localhost:5432/hideseek

      - name: Typecheck
        run: npx -y turbo run typecheck

      - name: Lint
        run: npx eslint .

      - name: Test
        run: npx -y turbo run test
        env:
          DATABASE_URL: postgresql://hideseek:hideseek@localhost:5432/hideseek

  build-server-image:
    name: Build Server Docker Image
    runs-on: ubuntu-latest
    needs: lint-typecheck-test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f docker/Dockerfile.server -t hideseek-server:latest .

      # Do przyszłego użycia: push do registry (GHCR, Docker Hub)
      # - name: Push to GHCR
      #   run: |
      #     echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      #     docker tag hideseek-server:latest ghcr.io/${{ github.repository }}/server:latest
      #     docker push ghcr.io/${{ github.repository }}/server:latest
